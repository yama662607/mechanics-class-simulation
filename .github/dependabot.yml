# Dependabot keeps third-party dependencies and GitHub Actions up to date.
# After clone, optionally migrate Action pins from tag (e.g. @v4) to commit
# SHAs (e.g. @abc1234) for stricter supply-chain hardening; Dependabot will
# then automate SHA bumps.

version: 2
updates:
  # GitHub Actions in .github/workflows/
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "github-actions"

  # Python (uv reads pyproject.toml; Dependabot supports `pip` ecosystem)
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "python"

  # Node.js
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "javascript"

  # Dev container features (Docker base image + features)
  - package-ecosystem: "devcontainers"
    directory: "/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "devcontainer"

name: Quarto Publish

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write   # required to push the gh-pages branch
  pages: write      # required by quarto-actions/publish

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Quarto
        # tinytex は外す: Pages に載せるのは HTML のみで PDF は不要。
        # tinytex 経由の LaTeX render は ~20 分超で workflow が完走しなかった。
        # PDF が要るときはローカルで `just render-book-pdf`。
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Install Node dependencies
        run: npm ci

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Install Python dependencies
        run: |
          uv sync
          echo "$GITHUB_WORKSPACE/.venv/bin" >> $GITHUB_PATH

      - name: Render (HTML only)
        run: quarto render quarto --to html
        env:
          QUARTO_PYTHON: ${{ github.workspace }}/.venv/bin/python

      - name: Publish to gh-pages
        uses: quarto-dev/quarto-actions/publish@v2
        with:
          target: gh-pages
          path: quarto
          render: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          QUARTO_PYTHON: ${{ github.workspace }}/.venv/bin/python

<!--
  One-time cleanup for visitors with a stale Service Worker registered by
  the previous Shinylive build of this site. Safe to remove once enough
  time has passed for all returning visitors to have hit a page once.
-->
<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.getRegistrations().then(function (regs) {
      regs.forEach(function (r) {
        var url = (r.active && r.active.scriptURL) || '';
        if (url.indexOf('shinylive-sw') !== -1) {
          r.unregister();
        }
      });
    });
  }
</script>

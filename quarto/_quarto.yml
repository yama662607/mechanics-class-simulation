project:
  type: book
  output-dir: _output
  resources:
    - "assets/pdf/**/*.pdf"
    - "assets/images/**/*"
  preview:
    watch-inputs: true

book:
  title: "物理学基礎論A (力学) 補足ノート"
  author: "Daisuke Yamashiki"
  date: last-modified
  navbar:
    left:
      - text: "ホーム"
        href: index.qmd
  sidebar:
    style: "docked"
    search: true
    collapse-level: 4
  chapters:
    - index.qmd
    - part: "理論体系ノート"
      chapters:
        - theory/textbook.qmd
    - part: "シミュレーション"
      chapters:
        - theory/topics/simulations/sample.qmd
    - part: "演習問題"
      chapters:
        - theory/topics/exercises/polar_kinematics.qmd
  page-navigation: true
  page-footer:
    left: "物理学基礎論A (力学) 学習ノート"
    right:
      - text: "ホーム"
        href: index.qmd

number-sections: false
crossref:
  chapters: true
  sec-prefix: "節"
  fig-prefix: "図"
  tbl-prefix: "表"
  eq-prefix: "式"

lang: ja

format:
  html:
    theme: cosmo
    css: templates/styles.css
    include-after-body: templates/sidebar-toggle.html
    toc: true
    toc-depth: 3
    toc-location: right
    code-fold: true
    code-tools: true
    code-copy: true
    link-external-newwindow: true
    smooth-scroll: true
    anchor-sections: true
    fig-cap-location: bottom
    tbl-cap-location: top
    grid:
      body-width: 1100px
      margin-width: 250px
      sidebar-width: 220px
      gutter-width: 1.5rem
    html-math-method: katex
  pdf:
    include-in-header: preamble.tex
    pdf-engine: xelatex
    top-level-division: chapter
    number-sections: true
    number-depth: 2

execute:
  freeze: auto

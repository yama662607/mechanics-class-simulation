project:
  type: book
  # Quarto 公式推奨は _book (https://quarto.org/docs/books/)
  output-dir: _book
  resources:
    - "assets/pdf/**/*.pdf"
    - "assets/images/**/*.png"
    - "assets/images/**/*.jpg"
    # Quarto Live (Pyodide) 用 — Noto Sans JP フォントを matplotlib に
    # 届けるために配布対象に含める。詳細は AGENTS.md の「対話シミュレーション」節。
    - "assets/fonts/**/*"
  preview:
    watch-inputs: true

book:
  title: "Your Textbook Title"
  author: "Your Name"
  date: last-modified

  # GitHub 連携 (utilizes book.repo-url + repo-actions for "Edit" / "Issue" links)
  # テンプレ利用時は your-org/your-repo を書き換えてください。
  repo-url: https://github.com/your-org/your-repo
  repo-branch: main
  repo-actions: [edit, issue]

  # PDF ダウンロードボタン (uv sync --extra notebook 等で計算ブロックを使う場合)
  # downloads: [pdf]

  # 引用情報 (Cite this book → BibTeX 出力)
  # citation: true

  # 検索を有効化
  search: true

  navbar:
    left:
      - text: "ホーム"
        href: index.qmd
  sidebar:
    style: "docked"
    collapse-level: 4
  chapters:
    - index.qmd
    - part: "本編"
      chapters:
        - textbook/textbook.qmd
  page-navigation: true
  page-footer:
    left: "© Your Name"
    right:
      - text: "ホーム"
        href: index.qmd

# 文献ファイル (任意 — quarto/templates/references.bib をデフォルトで参照)
# bibliography: templates/references.bib

number-sections: false
crossref:
  chapters: true
  sec-prefix: "節"
  fig-prefix: "図"
  tbl-prefix: "表"
  eq-prefix: "式"

lang: ja

format:
  html:
    theme: cosmo
    css: templates/styles.css
    include-in-header: templates/plotly-loader.html
    include-after-body: templates/sidebar-toggle.html
    toc: true
    toc-depth: 3
    toc-location: right
    code-fold: true
    code-tools: true
    code-copy: true
    link-external-newwindow: true
    smooth-scroll: true
    anchor-sections: true
    fig-cap-location: bottom
    tbl-cap-location: top
    grid:
      body-width: 1100px
      margin-width: 250px
      sidebar-width: 250px
      gutter-width: 1.5rem
    html-math-method: katex
  pdf:
    include-in-header: preamble.tex
    pdf-engine: xelatex
    top-level-division: chapter
    number-sections: true
    number-depth: 2

execute:
  freeze: auto
